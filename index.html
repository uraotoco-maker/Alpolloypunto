const HORARIOS = {
  0: [{from:"10:00",to:"22:00"}], // Domingo
  1: [{from:"08:00",to:"12:00"},{from:"17:00",to:"22:00"}], // Lunes
  2: [{from:"08:00",to:"12:00"},{from:"17:00",to:"22:00"}], // Martes
  3: [{from:"08:00",to:"12:00"},{from:"17:00",to:"22:00"}], // Miercoles
  4: [{from:"08:00",to:"12:00"},{from:"17:00",to:"22:00"}], // Jueves
  5: [{from:"08:00",to:"12:00"},{from:"17:00",to:"23:00"}], // Viernes
  6: [{from:"08:00",to:"13:00"},{from:"17:00",to:"23:00"}], // Sabado
};
const DIAS = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

function getStatus(){
  const now = new Date();
  const day = now.getDay();
  const hm = now.getHours()*60 + now.getMinutes();
  const slots = HORARIOS[day]||[];
  for(const s of slots){
    const [fh,fm]=s.from.split(":").map(Number);
    const [th,tm]=s.to.split(":").map(Number);
    if(hm >= fh*60+fm && hm < th*60+tm) return {open:true, closes:s.to};
  }
  // siguiente apertura
  for(const s of slots){
    const [fh,fm]=s.from.split(":").map(Number);
    if(hm < fh*60+fm) return {open:false, next:"Hoy "+s.from};
  }
  // mañana
  const nextDay = (day+1)%7;
  const nextSlots = HORARIOS[nextDay]||[];
  if(nextSlots.length) return {open:false, next:DIAS[nextDay]+" "+nextSlots[0].from};
  return {open:false, next:null};
}

// ── STATUS BAR ──
function StatusBar(){
  const [status,setStatus]=useState(getStatus());
  const [showHours,setShowHours]=useState(false);
  useEffect(()=>{
    const t=setInterval(()=>setStatus(getStatus()),30000);
    return ()=>clearInterval(t);
  },[]);
  return h("div",{style:{background:"#111",borderBottom:"1px solid rgba(255,255,255,0.07)"}},
    h("div",{
      onClick:()=>setShowHours(s=>!s),
      style:{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",cursor:"pointer"}
    },
      h("span",{style:{fontSize:14}},"🕐"),
      h("span",{style:{fontSize:12,fontWeight:700,color:status.open?"#27ae60":"#e63946"}},
        status.open?"Abierto ahora · Cierra a las "+status.closes : "Cerrado"+(status.next?" · Abre "+status.next:"")
      ),
      h("span",{style:{fontSize:10,color:"#555",marginLeft:"auto"}},(showHours?"▲":"▼"))
    ),
    showHours&&h("div",{style:{padding:"0 16px 10px"}},
      Object.entries(HORARIOS).map(([d,slots])=>
        h("div",{key:d,style:{display:"flex",justifyContent:"space-between",fontSize:11,color:"#aaa",padding:"3px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}},
          h("span",{style:{color:"#fff",fontWeight:600}},DIAS[parseInt(d)]),
          h("div",{style:{textAlign:"right"}},
            slots.map((s,i)=>h("div",{key:i},s.from+" – "+s.to))
          )
        )
      )
    )
  );
}

    setTimeout(()=>setOk(false),900);

  return h("div",{style:{background:"#1c1c1c",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,overflow:"hidden",marginBottom:8}},

      },
        imgSrc
          ?[h("img",{key:"i",src:imgSrc,alt:p.name,style:{width:"100%",height:"100%",objectFit:"cover",display:"block"}}),
            h("div",{key:"z",style:{position:"absolute",bottom:3,right:3,background:"rgba(0,0,0,0.6)",borderRadius:4,padding:"1px 4px",fontSize:9,color:"rgba(255,255,255,0.65)"}},"🔍")]
          :h("div",{style:{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:34}},EM[p.cat]||"🍗")
      ),
      h("div",{style:{flex:1,minWidth:0}},
        h("div",{style:{fontSize:14,fontWeight:700,lineHeight:1.3}},
          p.name,
          p.badge&&h("span",{style:{display:"inline-block",background:"rgba(193,18,31,0.15)",color:"#e63946",fontSize:8,fontWeight:700,padding:"2px 5px",borderRadius:3,marginLeft:5,letterSpacing:0.3,textTransform:"uppercase",verticalAlign:"middle"}},p.badge)
        ),
        h("div",{style:{fontSize:11,color:"#666",marginTop:3,lineHeight:1.5}},p.desc),
        h("div",{style:{marginTop:5,fontSize:12,color:"#aaa",fontWeight:600,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
          p.dp,
          p.old&&h("span",{style:{fontSize:11,color:"#555",textDecoration:"line-through"}},fmt(p.old))
        )
      )
    ),
    // QTY + ADD
    h("div",{style:{display:"flex",gap:8,padding:"0 12px 12px",alignItems:"center"}},
      opts&&h("div",{style:{display:"flex",gap:4,flex:1,flexWrap:"wrap"}},
        opts.map(o=>h("button",{
          key:o.l,onClick:()=>setSel(o),
          style:{background:sel&&sel.l===o.l?"#c1121f":"#111",border:"1px solid "+(sel&&sel.l===o.l?"#c1121f":"rgba(255,255,255,0.1)"),color:sel&&sel.l===o.l?"#fff":"#999",borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}
        },o.l))
      ),
      !opts&&h("div",{style:{flex:1}}),
      h("button",{onClick:add,style:{background:ok?"#27ae60":"#c1121f",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:800,cursor:"pointer",flexShrink:0,minWidth:95,textAlign:"center",transition:"background 0.2s"}},
        ok?"✓ Listo":"+ "+fmt(price))
    )
  );
}

// ── APP ──
function App(){
  const [cart,setCart]=useState([]);
  const [cat,setCat]=useState("todos");
  const [search,setSearch]=useState("");
  const [cartOpen,setCartOpen]=useState(false);
  const [panel,setPanel]=useState("menu");
  const [note,setNote]=useState("");
  const [zona,setZona]=useState("");
  const [lb,setLb]=useState(null);

  const count=cart.length;
  const subtotal=cart.reduce((a,i)=>a+i.price,0);
  const envioCosto = zona ? (ENVIO_ZONAS.find(z=>z.id===zona)||{costo:0}).costo : 0;
  const total = subtotal + (envioCosto > 0 ? envioCosto : 0);

  function addToCart(item){
    setCart(c=>[...c,{key:Date.now()+"_"+Math.random(),...item}]);
  }
  function removeItem(key){setCart(c=>c.filter(i=>i.key!==key));}
  function clearCart(){setCart([]);setNote("");setZona("");}

  function sendOrder(){
    const lines=cart.map(i=>"• "+i.name+" "+i.ql+" = "+fmt(i.price));
    const zonaInfo = zona ? (ENVIO_ZONAS.find(z=>z.id===zona)||{label:"",costo:0}) : null;
    let msg="Hola! Quiero hacer el siguiente pedido 🍗\n\n"+lines.join("\n");
    if(zonaInfo) msg+="\n\n🚚 Envío: "+zonaInfo.label+(zonaInfo.costo===0?" (GRATIS)":zonaInfo.costo===-1?" (a confirmar)":" = "+fmt(zonaInfo.costo));
    msg+="\n\n*Total: "+fmt(total)+"*"+(envioCosto===-1?" + envío a confirmar":"");
    if(note.trim()) msg+="\n\n📝 Nota: "+note.trim();
    msg+="\n\nPor favor confirmar disponibilidad y coordinar entrega. Gracias!";
    window.open("https://wa.me/5491140371739?text="+encodeURIComponent(msg),"_blank");
  }

  const sl=search.toLowerCase();
  const filtered=PRODS.filter(p=>(cat==="todos"||p.cat===cat)&&(!sl||p.name.toLowerCase().includes(sl)||p.desc.toLowerCase().includes(sl)));
  const grouped=cat==="todos"&&!sl
    ?CATS.filter(c=>c.id!=="todos").map(c=>({label:c.l,items:PRODS.filter(p=>p.cat===c.id)}))
    :[{label:null,items:filtered}];

  const isMobile = typeof window!=="undefined" && window.innerWidth < 600;

  return h("div",{className:"app-shell",style:{maxWidth:480,margin:"0 auto",background:"#0f0f0f",color:"#f0f0f0",display:"flex",flexDirection:"column",height:isMobile?"100dvh":"auto",minHeight:"100vh",overflow:isMobile?"hidden":"visible"}},

    lb&&h(Lightbox,{src:lb.src,name:lb.name,onClose:()=>setLb(null)}),

    // HEADER
    h("div",{style:{background:"#c1121f",padding:"12px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0,boxShadow:"0 2px 20px rgba(193,18,31,0.5)"}},
      h("img",{src:IMGS.logo,alt:"Logo",style:{width:46,height:46,borderRadius:"50%",objectFit:"cover",border:"2px solid rgba(255,255,255,0.4)",flexShrink:0}}),
      h("div",{style:{flex:1}},
        h("div",{style:{fontSize:18,fontWeight:800,color:"#fff",lineHeight:1}},"Al Pollo y Punto"),
        h("div",{style:{fontSize:11,color:"rgba(255,255,255,0.8)",marginTop:2}},"📍 Avellaneda · Sellado al vacío")
      ),
      h("div",{onClick:()=>setCartOpen(true),style:{position:"relative",background:"rgba(0,0,0,0.25)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:10,padding:"8px 14px",display:"flex",alignItems:"center",gap:6,cursor:"pointer",WebkitTapHighlightColor:"transparent"}},
        h("span",{style:{fontSize:20}},"🛒"),
        h("span",{style:{fontSize:13,fontWeight:700,color:"#fff"}},fmt(subtotal)),
        count>0&&h("div",{style:{position:"absolute",top:-7,right:-7,background:"#fff",color:"#c1121f",fontSize:10,fontWeight:800,width:18,height:18,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}},count)
      )
    ),

    // STATUS BAR
    h(StatusBar,null),

    // SEARCH + CATS
    panel==="menu"&&h("div",{style:{flexShrink:0}},
      h("div",{style:{background:"#161616",padding:"10px 16px 0"}},
        h("input",{value:search,onChange:e=>setSearch(e.target.value),placeholder:"🔍 Buscar producto...",style:{width:"100%",background:"#1c1c1c",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"9px 14px",color:"#f0f0f0",fontSize:13,outline:"none",WebkitAppearance:"none"}})
      ),
      h("div",{style:{background:"#161616",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"10px 16px",display:"flex",gap:8,overflowX:"auto",WebkitOverflowScrolling:"touch"}},
        CATS.map(c=>h("div",{key:c.id,onClick:()=>{setCat(c.id);setSearch("");},style:{background:cat===c.id?"#c1121f":"#1c1c1c",border:"1px solid "+(cat===c.id?"#c1121f":"rgba(255,255,255,0.08)"),borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:600,color:cat===c.id?"#fff":"#888",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,WebkitTapHighlightColor:"transparent"}},c.l))
      )
    ),

    // PRODUCTS
    panel==="menu"&&h("div",{style:{flex:1,overflowY:"auto",padding:"12px 12px 90px",WebkitOverflowScrolling:"touch"}},
      grouped.map((g,gi)=>h("div",{key:gi},
        g.label&&h("div",{style:{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"#555",margin:"16px 4px 10px",display:"flex",alignItems:"center",gap:10}},
          g.label,h("div",{style:{flex:1,height:1,background:"rgba(255,255,255,0.07)"}})
        ),
        g.items.length===0&&h("div",{style:{textAlign:"center",padding:"30px",color:"#444",fontSize:13}},"No se encontraron productos"),
        g.items.map(p=>h(ProdCard,{key:p.id,p,onAdd:addToCart,onImg:(src,name)=>setLb({src,name})}))
      ))
    ),

    // INFO
    panel==="info"&&h("div",{style:{flex:1,overflowY:"auto",padding:"20px 16px 90px",WebkitOverflowScrolling:"touch"}},
      h("div",{style:{fontSize:14,fontWeight:700,color:"#e63946",marginBottom:12}},"🚚 Envíos a domicilio"),
      ...[
        {title:"📍 Hasta 2 km",rows:[["Hasta $19.999","$2.000","r"],["$20.000 a $39.999","$1.500","go"],["Desde $40.000","GRATIS 🎉","gr"]]},
        {title:"🗺️ De 2 a 5 km",rows:[["Hasta $39.999","$2.500","r"],["Desde $40.000","$1.500","go"]]},
      ].map((z,i)=>h("div",{key:i,style:{background:"#1c1c1c",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,overflow:"hidden",marginBottom:10}},
        h("div",{style:{padding:"10px 14px",background:"rgba(0,0,0,0.3)",fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"#e63946"}},z.title),
        h("div",{style:{padding:"4px 14px"}},
          z.rows.map(([l,v,c],j)=>h("div",{key:j,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:j<z.rows.length-1?"1px solid rgba(255,255,255,0.06)":"none",fontSize:13}},
            h("span",{style:{color:"#bbb"}},l),
            h("span",{style:{fontWeight:800,color:c==="gr"?"#27ae60":c==="go"?"#c9921a":"#e63946"}},v)
          ))
        )
      )),
      h("div",{style:{background:"rgba(201,146,26,0.08)",border:"1px solid rgba(201,146,26,0.2)",borderRadius:10,padding:"12px 14px",textAlign:"center",fontSize:12,color:"#c9921a",fontWeight:600,marginBottom:20}},"🚚 Más de 5 km — Consultanos por WhatsApp"),
      h("div",{style:{fontSize:14,fontWeight:700,color:"#e63946",marginBottom:12}},"📋 Información"),
      h("div",{style:{background:"#1c1c1c",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"4px 14px",marginBottom:20}},
        [["🕐","Pedidos a coordinar por WhatsApp según horario"],["⏱️","Pedidos con 24hs de anticipación"],["📦","Todos los productos sellados al vacío"],["💳","Efectivo · Transferencia · Mercado Pago"]].map(([ic,tx],i,arr)=>
          h("div",{key:i,style:{display:"flex",gap:10,fontSize:13,color:"#ccc",padding:"9px 0",borderBottom:i<arr.length-1?"1px solid rgba(255,255,255,0.06)":"none",lineHeight:1.5}},
            h("span",null,ic),h("span",null,tx)
          )
        )
      ),
      h("div",{style:{fontSize:14,fontWeight:700,color:"#e63946",marginBottom:12}},"🕐 Horarios"},
      h("div",{style:{background:"#1c1c1c",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"4px 14px",marginBottom:20}},
        Object.entries(HORARIOS).map(([d,slots])=>
          h("div",{key:d,style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"8px 0",borderBottom:parseInt(d)<6?"1px solid rgba(255,255,255,0.06)":"none",fontSize:13}},
            h("span",{style:{color:"#fff",fontWeight:600,minWidth:90}},DIAS[parseInt(d)]),
            h("div",{style:{textAlign:"right"}},
              slots.map((s,i)=>h("div",{key:i,style:{color:"#aaa"}},s.from+" – "+s.to))
            )
          )
        )
      ),
      h("div",{style:{fontSize:14,fontWeight:700,color:"#e63946",marginBottom:12}},"📱 Contacto"),
      h("a",{href:"https://wa.me/5491140371739",style:{display:"flex",alignItems:"center",justifyContent:"center",gap:10,background:"#25D366",color:"#fff",padding:16,borderRadius:10,fontSize:14,fontWeight:700,marginBottom:10}},"💬 WhatsApp · 011 4037-1739"),
      h("a",{href:"https://instagram.com/alpolloypunto",style:{display:"flex",alignItems:"center",justifyContent:"center",gap:10,background:"#833AB4",color:"#fff",padding:14,borderRadius:10,fontSize:14,fontWeight:700}},"📷 @alpolloypunto")
    ),

    // BOTTOM NAV
    h("div",{className:"bottom-nav-fixed",style:{position:"sticky",bottom:0,width:"100%",background:"#161616",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",zIndex:50,flexShrink:0}},
      [["menu","🍽️","Menú"],["info","ℹ️","Info"]].map(([id,ic,lb2])=>
        h("div",{key:id,onClick:()=>setPanel(id),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0",cursor:"pointer",color:panel===id?"#e63946":"#555",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,gap:3,WebkitTapHighlightColor:"transparent"}},
          h("span",{style:{fontSize:22}},ic),h("span",null,lb2)
        )
      )
    ),

    // OVERLAY
    cartOpen&&h("div",{onClick:()=>setCartOpen(false),style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:100}}),

    // CART DRAWER
    h("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%) translateY("+(cartOpen?0:110)+"%)",width:"100%",maxWidth:480,background:"#161616",borderRadius:"20px 20px 0 0",zIndex:101,transition:"transform 0.35s cubic-bezier(0.34,1.56,0.64,1)",maxHeight:"90vh",display:"flex",flexDirection:"column",borderTop:"2px solid #c1121f"}},
      h("div",{style:{width:36,height:4,background:"rgba(255,255,255,0.15)",borderRadius:2,margin:"12px auto 0"}}),
      h("div",{style:{fontSize:16,fontWeight:800,padding:"12px 20px 10px",borderBottom:"1px solid rgba(255,255,255,0.08)",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        "🛒 Mi pedido",
        h("div",{style:{display:"flex",gap:10,alignItems:"center"}},
          cart.length>0&&h("button",{onClick:clearCart,style:{background:"none",border:"1px solid rgba(255,255,255,0.1)",color:"#888",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}},"Vaciar"),
          h("button",{onClick:()=>setCartOpen(false),style:{background:"none",border:"none",color:"#666",fontSize:26,cursor:"pointer",lineHeight:1}},"×")
        )
      ),
      h("div",{style:{flex:1,overflowY:"auto",padding:"8px 16px",WebkitOverflowScrolling:"touch"}},
        cart.length===0
          ?h("div",{style:{textAlign:"center",padding:"36px 20px",color:"#444"}},
              h("div",{style:{fontSize:44,marginBottom:12}},"🛒"),
              h("div",{style:{fontSize:13}},"Tu carrito está vacío.")
            )
          :cart.map(item=>h("div",{key:item.key,style:{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.06)"}},
              h("div",{style:{flex:1}},
                h("div",{style:{fontSize:13,fontWeight:600}},item.name),
                h("div",{style:{fontSize:11,color:"#555",marginTop:2}},item.ql)
              ),
              h("div",{style:{fontSize:14,fontWeight:800,color:"#e63946"}},fmt(item.price)),
              h("button",{onClick:()=>removeItem(item.key),style:{background:"rgba(193,18,31,0.12)",border:"none",color:"#e63946",borderRadius:6,width:28,height:28,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}},"✕")
            ))
      ),
      // ENVIO SELECTOR
      cart.length>0&&h("div",{style:{padding:"0 16px 8px"}},
        h("div",{style:{fontSize:12,fontWeight:700,color:"#888",marginBottom:6,textTransform:"uppercase",letterSpacing:1}},"🚚 Zona de envío"),
        h("select",{
          value:zona,onChange:e=>setZona(e.target.value),
          style:{width:"100%",background:"#1c1c1c",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"9px 12px",color:zona?"#f0f0f0":"#555",fontSize:12,outline:"none",WebkitAppearance:"none"}
        },
          h("option",{value:""},"Seleccioná tu zona..."),
          ENVIO_ZONAS.map(z=>h("option",{key:z.id,value:z.id},z.label+(z.costo===0?" — GRATIS":z.costo===-1?" — A consultar":" — "+fmt(z.costo))))
        ),
        zona&&envioCosto===0&&h("div",{style:{fontSize:11,color:"#27ae60",marginTop:4,fontWeight:700}},"🎉 ¡Envío gratis!"),
        zona&&envioCosto===-1&&h("div",{style:{fontSize:11,color:"#c9921a",marginTop:4,fontWeight:700}},"Te cotizamos el envío por WhatsApp")
      ),
      cart.length>0&&h("div",{style:{padding:"0 16px 8px"}},
        h("textarea",{value:note,onChange:e=>setNote(e.target.value),placeholder:"📝 Nota: dirección, horario, aclaraciones...",rows:2,style:{width:"100%",background:"#1c1c1c",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"9px 12px",color:"#f0f0f0",fontSize:12,outline:"none"}})
      ),
      h("div",{style:{padding:"12px 16px 24px",borderTop:"1px solid rgba(255,255,255,0.08)"}},
        h("div",{style:{fontSize:11,color:"#555",marginBottom:4,display:"flex",justifyContent:"space-between"}},
          h("span",null,"Subtotal"),h("span",null,fmt(subtotal))
        ),
        zona&&envioCosto!==0&&envioCosto!==-1&&h("div",{style:{fontSize:11,color:"#888",marginBottom:4,display:"flex",justifyContent:"space-between"}},
          h("span",null,"Envío"),h("span",null,fmt(envioCosto))
        ),
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
          h("span",{style:{fontSize:15,fontWeight:700}},"Total"),
          h("span",{style:{fontSize:26,fontWeight:800,color:"#e63946"}},
            fmt(total),(envioCosto===-1?"*":"")
          )
        ),
        h("button",{
          onClick:sendOrder,disabled:cart.length===0,
          style:{width:"100%",background:cart.length>0?"#25D366":"#222",color:cart.length>0?"#fff":"#444",border:"none",borderRadius:10,padding:16,fontSize:15,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",gap:10,cursor:cart.length>0?"pointer":"default",WebkitTapHighlightColor:"transparent"}
        },"💬 Pedir por WhatsApp")
      )
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
