const VISITS_KEY="appp_visits_v4";
const DEVID_KEY="appp_devid_v4";
const PASS_KEY="appp_pass_v4";
const MASTER_PASS="1987";
const DEFAULT_PASS="2472";
const DEFAULT_STARS=[6,13,8,9,11,2];
const PULL_THRESHOLD=65;

function loadJ(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch(e){return fb;}}
function saveJ(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function loadPass(){try{return localStorage.getItem(PASS_KEY)||DEFAULT_PASS;}catch(e){return DEFAULT_PASS;}}
function savePass(p){try{localStorage.setItem(PASS_KEY,p);}catch(e){}}

function trackVisit(){
  try{
    const visits=loadJ(VISITS_KEY,{total:0,devices:[]});
    let devId=localStorage.getItem(DEVID_KEY);
    if(!devId){devId="dev_"+Date.now()+"_"+Math.random().toString(36).substr(2,6);localStorage.setItem(DEVID_KEY,devId);}
    const now=new Date().toISOString();
    const isMobile=/Mobi|Android/i.test(navigator.userAgent);
    const ex=visits.devices.find(d=>d.id===devId);
    if(ex){ex.visits++;ex.last=now;}
    else{visits.devices.push({id:devId,visits:1,first:now,last:now,mobile:isMobile});}
    visits.total++;
    saveJ(VISITS_KEY,visits);
  }catch(e){}
}

const DIAS=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

function getStatus(){
  const now=new Date();
  const day=now.getDay();
  const hm=now.getHours()*60+now.getMinutes();
  const slots=HORARIOS[day]||[];
  for(const s of slots){
    const[fh,fm]=s.f.split(":").map(Number);
    const[th,tm]=s.t.split(":").map(Number);
    if(hm>=fh*60+fm&&hm<th*60+tm)return{open:true,closes:s.t};
  }
  for(const s of slots){
    const[fh,fm]=s.f.split(":").map(Number);
    if(hm<fh*60+fm)return{open:false,next:"Hoy "+s.f};
  }
  const nd=(day+1)%7;
  const ns=HORARIOS[nd]||[];
  if(ns.length)return{open:false,next:DIAS[nd]+" "+ns[0].f};
  return{open:false,next:null};
}
