function loadJ(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch(e){return fb;}}
function saveJ(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function loadPass(){try{return localStorage.getItem(PASS_KEY)||DEFAULT_PASS;}catch(e){return DEFAULT_PASS;}}
function savePass(p){try{localStorage.setItem(PASS_KEY,p);}catch(e){}}

function trackVisit(){
  try{
    const visits=loadJ(VISITS_KEY,{total:0,devices:[]});
    let devId=localStorage.getItem(DEVID_KEY);
    if(!devId){devId="dev_"+Date.now()+"_"+Math.random().toString(36).substr(2,6);localStorage.setItem(DEVID_KEY,devId);}
    const now=new Date().toISOString();
    const isMobile=/Mobi|Android/i.test(navigator.userAgent);
    const ex=visits.devices.find(d=>d.id===devId);
    if(ex){ex.visits++;ex.last=now;}
    else{visits.devices.push({id:devId,visits:1,first:now,last:now,mobile:isMobile});}
    visits.total++;
    saveJ(VISITS_KEY,visits);
  }catch(e){}
}

const DIAS=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

function getStatus(){
  const now=new Date();
  const day=now.getDay();
  const hm=now.getHours()*60+now.getMinutes();
  const slots=HORARIOS[day]||[];
  for(const s of slots){
    const[fh,fm]=s.f.split(":").map(Number);
    const[th,tm]=s.t.split(":").map(Number);
    if(hm>=fh*60+fm&&hm<th*60+tm)return{open:true,closes:s.t};
  }
  for(const s of slots){
    const[fh,fm]=s.f.split(":").map(Number);
    if(hm<fh*60+fm)return{open:false,next:"Hoy "+s.f};
  }
  const nd=(day+1)%7;
  const ns=HORARIOS[nd]||[];
  if(ns.length)return{open:false,next:DIAS[nd]+" "+ns[0].f};
  return{open:false,next:null};
}

function useClock(){
  const[t,setT]=useState(new Date());
  useEffect(()=>{const i=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(i);},[]);
  return t;
}
function fmtClock(d){return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function fmtDate(iso){try{return new Date(iso).toLocaleString("es-AR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}catch(e){return iso;}}

function PullIndicator({dist,refreshing}){
  const pct=Math.min(dist/PULL_THRESHOLD,1);
  if(dist<=0&&!refreshing)return null;
  return h("div",{style:{height:refreshing?56:Math.max(dist,0),overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",transition:refreshing?"height 0.3s":"none",background:"rgba(193,18,31,0.05)",flexShrink:0}},
    h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,opacity:Math.max(pct,refreshing?1:0)}},
      h("div",{style:{fontSize:20,display:"inline-block",animation:refreshing?"spin 0.7s linear infinite":"none"}},refreshing?"🔄":pct>=1?"✅":"⬇️"),
      h("div",{style:{fontSize:10,color:"#888",fontWeight:600}},refreshing?"Actualizando...":pct>=1?"Soltá para actualizar":"Deslizá para actualizar")
    )
  );
}
